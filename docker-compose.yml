services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ADAPTIVE_TUTOR_ENVIRONMENT: development
      ADAPTIVE_TUTOR_DATABASE_URL: postgresql+psycopg://adaptive_tutor:adaptive_tutor@db:5432/adaptive_tutor
      ADAPTIVE_TUTOR_LLM_PROVIDER: ${ADAPTIVE_TUTOR_LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADAPTIVE_TUTOR_OPENAI_MODEL: ${ADAPTIVE_TUTOR_OPENAI_MODEL:-gpt-4.1-mini}
      ADAPTIVE_TUTOR_OPENAI_BASE_URL: ${ADAPTIVE_TUTOR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ADAPTIVE_TUTOR_CORS_ALLOWED_ORIGINS: ${ADAPTIVE_TUTOR_CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      ADAPTIVE_TUTOR_AUTH_COOKIE_SECURE: ${ADAPTIVE_TUTOR_AUTH_COOKIE_SECURE:-false}
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: adaptive_tutor
      POSTGRES_USER: adaptive_tutor
      POSTGRES_PASSWORD: adaptive_tutor
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptive_tutor -d adaptive_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend-node-modules:
  postgres-data:
  uv-cache:
