services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ADAPTIVE_TUTOR_ENVIRONMENT: development
      ADAPTIVE_TUTOR_DATABASE_URL: postgresql+psycopg://adaptive_tutor:adaptive_tutor@db:5432/adaptive_tutor
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: adaptive_tutor
      POSTGRES_USER: adaptive_tutor
      POSTGRES_PASSWORD: adaptive_tutor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptive_tutor -d adaptive_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  uv-cache:
